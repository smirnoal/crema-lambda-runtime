plugins {
    id 'java'
    id 'org.graalvm.buildtools.native' version '0.10.1' apply false
}

allprojects {
    group = 'com.smirnoal'
    version = '1.0-SNAPSHOT'
    
    repositories {
        mavenCentral()
        gradlePluginPortal()
    }
}

subprojects {
    apply plugin: 'java'
    
    sourceCompatibility = '17'
    targetCompatibility = '17'
    
    tasks.withType(JavaCompile) {
        options.encoding = 'UTF-8'
    }
}

// Native image build logic available to all subprojects
ext.addNativeCompileLinuxTask = { project, mainClassName ->
    project.plugins.apply('org.graalvm.buildtools.native')

    project.graalvmNative {
        binaries {
            main {
                imageName = 'bootstrap'
                mainClass = mainClassName
            }
        }
        toolchainDetection = false
    }

    project.tasks.register('nativeCompileLinux', Exec) {
        group = 'native'
        description = "Build native image for Linux using Docker for ${project.name}"

        dependsOn project.tasks.compileJava

        workingDir project.projectDir

        commandLine 'docker', 'run', '--rm',
            '-v', "${rootProject.rootDir.absolutePath}:/workspace",
            '-w', '/workspace',
            '--entrypoint', 'bash',
            'ghcr.io/graalvm/native-image-community:17',
            '-c', """
                microdnf install -y findutils
                ./gradlew ${project.path}:nativeCompile --no-daemon
            """

        doFirst {
            println "Building Linux native image for ${project.name} using Docker (with xargs)..."
            println "Working directory: ${rootProject.rootDir.absolutePath}"
        }

        doLast {
            println "Linux native image built successfully for ${project.name}!"
            println "Binary location: ${project.buildDir}/native/nativeCompile/${project.name}"
        }
    }

    // Ensure native image is built as part of the standard build
    project.tasks.named('build') {
        dependsOn project.tasks.named('nativeCompileLinux')
    }
} 